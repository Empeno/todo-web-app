<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/site.css" />
</head>
<body>
    <div class="app-hero">
        <div class="container">
            <div class="d-flex align-items-center gap-3">
                <span class="hero-icon"><i class="bi bi-check2-circle"></i></span>
                <div>
                    <h1 class="hero-title mb-1">To-do CRUD</h1>
                    <p class="hero-subtitle mb-0">Stay organized, get things done.</p>
                </div>
                <a href="movies.html" class="btn btn-light btn-sm ms-auto align-self-start">
                    <i class="bi bi-film me-1"></i> Movies
                </a>
            </div>
        </div>
    </div>

    <div class="container app-container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm add-card mb-4">
                    <div class="card-body">
                        <h2 class="h5 card-title text-muted mb-3">
                            <i class="bi bi-plus-circle me-1"></i> Add a new to-do
                        </h2>
                        <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-white"><i class="bi bi-pencil"></i></span>
                                <input type="text" id="add-name" class="form-control" placeholder="What needs to be done?">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-plus-lg me-1"></i> Add
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span class="fw-semibold"><i class="bi bi-list-check me-1"></i> My To-dos</span>
                        <span id="counter" class="badge rounded-pill text-bg-primary">0 to-dos</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" class="text-center" style="width: 90px;">Done</th>
                                    <th scope="col">Name</th>
                                    <th scope="col" class="text-end" style="width: 170px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="todos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit modal -->
    <div class="modal fade" id="editForm" tabindex="-1" aria-labelledby="editFormLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form action="javascript:void(0);" onsubmit="updateItem()">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editFormLabel"><i class="bi bi-pencil-square me-1"></i> Edit to-do</h5>
                        <button type="button" class="btn-close" onclick="closeInput()" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label for="edit-name" class="form-label">Name</label>
                            <input type="text" id="edit-name" class="form-control">
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="edit-isComplete">
                            <label class="form-check-label" for="edit-isComplete">Mark as complete</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" onclick="closeInput()">Cancel</button>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="js/site.js" asp-append-version="true"></script>
    <script type="text/javascript">
        getItems();
    </script>
</body>
</html>
